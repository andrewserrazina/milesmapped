[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app"]
combine_as_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "B", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

